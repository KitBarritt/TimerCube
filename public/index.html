<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/x-icon" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TimerCube</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1115;color:#e5e7eb;font-family:system-ui,sans-serif;min-height:100vh}
nav{display:flex;gap:1.5rem;padding:.75rem 1rem;border-bottom:1px solid #1f2937;align-items:center}
nav a{color:#9ca3af;text-decoration:none;font-size:.875rem}
nav a.active,nav a:hover{color:#e5e7eb}
.container{max-width:600px;margin:0 auto;padding:1.5rem 1rem}
.display{font-family:'Roboto',Arial,monospace;font-size:5.5rem;font-weight:bold;text-align:center;
  letter-spacing:.05em;margin:.5rem 0;transition:color .3s}
.display.off{color:#4b5563}
.display.running{color:#e5e7eb}
.display.green{color:#1db954}
.display.amber{color:#ff8c1a}
.display.red{color:#ff3b30}
.display.flash{color:#ff3b30}
.display.flash.dim{color:#3f0e0b}
.thresholds{text-align:center;color:#6b7280;font-size:.85rem;margin-bottom:1.25rem;min-height:1.2em}
.btn-row{display:flex;gap:.625rem;margin-bottom:1.25rem}
.btn{flex:1;padding:.75rem .5rem;border:none;border-radius:.5rem;font-size:1rem;cursor:pointer;
  font-weight:500;transition:filter .15s}
.btn:active{filter:brightness(.75)}
.btn-start{background:#1db954;color:#fff}.btn-stop{background:#374151;color:#e5e7eb}
.btn-reset{background:#7f1d1d;color:#fca5a5}
.sec-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#6b7280;margin-bottom:.4rem}
.presets{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;margin-bottom:1.25rem}
.preset{padding:.45rem .5rem;background:#1f2937;border:1px solid #374151;border-radius:.375rem;
  color:#9ca3af;font-size:.8rem;cursor:pointer;text-align:center;transition:all .15s}
.preset.active,.preset:hover{background:#1e3a2f;border-color:#1db954;color:#1db954}
select{width:100%;padding:.5rem;background:#1f2937;border:1px solid #374151;color:#e5e7eb;
  border-radius:.375rem;font-size:.9rem;margin-bottom:1.25rem}
.lights{display:flex;gap:.4rem;margin-bottom:1.25rem}
.light{flex:1;padding:.45rem 0;border:1px solid #374151;border-radius:.375rem;font-size:.75rem;
  cursor:pointer;background:#1f2937;color:#9ca3af;transition:all .15s}
.light:active{filter:brightness(.75)}
.l-off:hover{border-color:#9ca3af;color:#e5e7eb}
.l-green{border-color:#1db954;color:#1db954}.l-amber{border-color:#ff8c1a;color:#ff8c1a}
.l-red{border-color:#ff3b30;color:#ff3b30}.l-flash{border-color:#ff3b30;color:#ff3b30}
.statusbar{display:flex;justify-content:flex-end;align-items:center;gap:.75rem;
  font-size:.7rem;padding:.5rem 0}
</style>
</head>
<body>
<nav>
  <strong style="color:#e5e7eb">TimerCube</strong>
  <a href="/" class="active" data-i18n="nav_timer">Timer</a>
  <a href="/speakers.html" data-i18n="nav_speakers">Speakers</a>
  <a href="/report.html" data-i18n="nav_report">Report</a>
  <a href="/settings.html" data-i18n="nav_settings">Settings</a>
</nav>
<div class="container">
  <div class="display off" id="disp">0:00</div>
  <div class="thresholds" id="thresh"></div>

  <div class="btn-row">
    <button class="btn btn-start" id="btnStart" onclick="cmd('start')" data-i18n="btn_start">Start</button>
    <button class="btn btn-stop"  onclick="cmd('stop')" data-i18n="btn_stop">Stop</button>
    <button class="btn btn-reset" onclick="cmd('reset')" data-i18n="btn_reset">Reset</button>
  </div>

  <div class="sec-label" data-i18n="label_presets">Presets</div>
  <div class="presets" id="presets"></div>

  <div class="sec-label" data-i18n="label_speaker">Speaker</div>
  <select id="spkSel" onchange="pickSpeaker(this.value)">
    <option value="" data-i18n="opt_no_speaker">— No speaker —</option>
  </select>

  <div class="sec-label" data-i18n="label_manual_light">Manual light</div>
  <div class="lights">
    <button class="light l-off"   onclick="cmd('set_colour','off')"   data-i18n="light_off">Off</button>
    <button class="light l-green" onclick="cmd('set_colour','green')" data-i18n="light_green">Green</button>
    <button class="light l-amber" onclick="cmd('set_colour','amber')" data-i18n="light_amber">Amber</button>
    <button class="light l-red"   onclick="cmd('set_colour','red')"   data-i18n="light_red">Red</button>
    <button class="light l-flash" onclick="cmd('set_colour','flash')" data-i18n="light_flash">Flash</button>
  </div>

  <div class="statusbar">
    <span style="flex:1"></span>
    <span id="st" style="color:#6b7280">Connecting…</span>
    <span style="flex:1;text-align:right;color:#fff">TimerCube by Kit</span>
  </div>
</div>

<script src="/translations.js"></script>
<script>if(!window.TRANSLATIONS&&!sessionStorage.getItem('_tReload')){sessionStorage.setItem('_tReload','1');location.reload();}else{sessionStorage.removeItem('_tReload');}</script>
<script>
// ── i18n ─────────────────────────────────────────────────────────────────────
let currentLang = 'en';
function t(key) {
  const tr = (window.TRANSLATIONS||{})[currentLang]||{};
  const en = (window.TRANSLATIONS||{}).en||{};
  return tr[key]!==undefined ? tr[key] : (en[key]!==undefined ? en[key] : key);
}
function applyI18n() {
  if(!window.TRANSLATIONS) return;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // Re-render preset buttons and speaker dropdown with translated labels
  buildPresets();
  fillSpk();
}

// ── Preset definitions (times only; labels come from translations) ────────────
const PRESET_KEYS = [
  {key:'pre_1min',       times:[0,0,60,600]},
  {key:'pre_table_topics',times:[60,90,120,150]},
  {key:'pre_evaluations', times:[120,150,180,210]},
  {key:'pre_icebreaker',  times:[240,300,360,390]},
  {key:'pre_5_7min',      times:[300,360,420,450]},
  {key:'pre_10min',       times:[480,540,600,630]},
  {key:'pre_12min',       times:[600,660,720,750]},
  {key:'pre_15min',       times:[780,840,900,930]},
  {key:'pre_20min',       times:[960,1080,1200,1230]},
  {key:'pre_manual',      times:[0,0,0,0]},
];

let ws,state={colour:'off',elapsed:0,running:false,thresholds:[0,0,0,0],speaker:'',flash_on:false};
let speakers=[],activePre=-1;

function fmt(s){s=Math.floor(s);return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0');}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o));}
function cmd(type,val){
  if(type==='set_colour') send({type,colour:val});
  else send({type});
}

function setStatus(text,colour){
  const el=document.getElementById('st');
  el.textContent=text;
  el.style.color=colour;
}

function connect(){
  ws=new WebSocket('ws://'+location.host+'/ws');
  ws.onopen=()=>setStatus(t('st_connected'),'#1db954');
  ws.onmessage=e=>{const m=JSON.parse(e.data);
    if(m.type==='state'){state=m;render();}
    else if(m.type==='speakers'){speakers=m.speakers;fillSpk();}
    else if(m.type==='config'){
      const lang=m.config&&m.config.language?m.config.language:'en';
      if(lang!==currentLang){currentLang=lang;applyI18n();}
    }
  };
  ws.onclose=()=>{setStatus(t('st_reconnecting'),'#ff8c1a');setTimeout(connect,2000);};
  ws.onerror=()=>ws.close();
}

function render(){
  const d=document.getElementById('disp');
  d.textContent=fmt(state.elapsed);
  let cls=state.colour||'off';
  if(cls==='flash') cls='flash'+(state.flash_on?'':' dim');
  else if(cls==='off'&&state.running) cls='running';
  d.className='display '+cls;
  const thEl=document.getElementById('thresh');
  const thr=state.thresholds;
  if(thr.every(v=>!v)){thEl.textContent=t('threshold_manual');}
  else{
    const cols=['#1db954','#ff8c1a','#ff3b30'];
    const sep='<span style="color:#4b5563"> · </span>';
    thEl.innerHTML=thr.slice(0,3).map((v,i)=>
      v>0?`<span style="color:${cols[i]}">${fmt(v)}</span>`:null
    ).filter(Boolean).join(sep);
  }
  const btnStart=document.getElementById('btnStart');
  btnStart.textContent=state.running?t('btn_running'):t('btn_start');
  btnStart.disabled=state.running;
}

function fillSpk(){
  const sel=document.getElementById('spkSel'),cur=sel.value;
  sel.innerHTML=`<option value="">${t('opt_no_speaker')}</option>`;
  speakers.filter(s=>s.name&&s.name.trim()).forEach(s=>{
    const o=document.createElement('option');
    o.value=s.name;o.textContent=s.name;sel.appendChild(o);
  });
  sel.value=cur;
}

function pickSpeaker(name){
  send({type:'set_speaker',speaker:name});
  const spk=speakers.find(s=>s.name===name);
  if(spk&&spk.preset){
    send({type:'set_thresholds',thresholds:spk.preset});
    const idx=PRESET_KEYS.findIndex(p=>JSON.stringify(p.times)===JSON.stringify(spk.preset));
    highlightPre(idx);
  }
}

function highlightPre(idx){
  activePre=idx;
  document.querySelectorAll('.preset').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

function buildPresets(){
  const grid=document.getElementById('presets');
  grid.innerHTML='';
  PRESET_KEYS.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='preset'+(activePre===i?' active':'');
    b.textContent=t(p.key);
    b.onclick=()=>{send({type:'set_thresholds',thresholds:p.times});highlightPre(i);};
    grid.appendChild(b);
  });
}

document.addEventListener('keydown',e=>{
  if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName))return;
  const k=e.key.toLowerCase();
  if(k===' '){e.preventDefault();cmd('start');}
  else if(k==='s')cmd('stop');
  else if(k==='r')cmd('reset');
  else if(k==='g')cmd('set_colour','green');
  else if(k==='a')cmd('set_colour','amber');
  else if(k==='x')cmd('set_colour','red');
  else if(k==='f')cmd('set_colour','flash');
  else if(k==='c')cmd('set_colour','off');
});

// Initial render with default language, then connect
buildPresets();
setStatus(t('st_connecting'),'#6b7280');
connect();
</script>
</body>
</html>

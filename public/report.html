<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Report – TimerCube</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1115;color:#e5e7eb;font-family:system-ui,sans-serif;min-height:100vh}
nav{display:flex;gap:1.5rem;padding:.75rem 1rem;border-bottom:1px solid #1f2937;align-items:center}
nav a{color:#9ca3af;text-decoration:none;font-size:.875rem}
nav a.active,nav a:hover{color:#e5e7eb}
.container{max-width:760px;margin:0 auto;padding:1.5rem 1rem}
.toolbar{display:flex;gap:.5rem;margin-bottom:1rem;align-items:center}
.btn{padding:.45rem .875rem;border:none;border-radius:.375rem;font-size:.85rem;cursor:pointer;
  font-weight:500;background:#374151;color:#e5e7eb}
.btn:active{filter:brightness(.75)}
h2{font-size:1rem;font-weight:600;margin-right:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{background:#1f2937;color:#9ca3af;font-weight:500;padding:.5rem .6rem;text-align:left;
  border-bottom:2px solid #374151}
td{padding:.45rem .6rem;border-bottom:1px solid #1f2937;font-family:monospace}
td.name{font-family:system-ui,sans-serif}
tr:hover td{background:#111827}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:1rem;font-size:.75rem;font-weight:600}
.b-green{background:#14532d;color:#4ade80}
.b-amber{background:#78350f;color:#fbbf24}
.b-red{background:#450a0a;color:#fca5a5}
.b-over{background:#3b0764;color:#e879f9}
.b-under{background:#1e3a5f;color:#60a5fa}
.b-none{background:#1f2937;color:#6b7280}
.status{font-size:.75rem;color:#6b7280;padding:.5rem 0}
@media print{
  nav,.toolbar,.status{display:none}
  body{background:#fff;color:#000}
  th{background:#f3f4f6;color:#374151}
  td{border-bottom:1px solid #e5e7eb}
  .badge{border:1px solid currentColor}
}
</style>
</head>
<body>
<nav>
  <strong style="color:#e5e7eb">TimerCube</strong>
  <a href="/" data-i18n="nav_timer">Timer</a>
  <a href="/speakers.html" data-i18n="nav_speakers">Speakers</a>
  <a href="/report.html" class="active" data-i18n="nav_report">Report</a>
  <a href="/settings.html" data-i18n="nav_settings">Settings</a>
</nav>
<div class="container">
  <div class="toolbar">
    <h2 id="h_report" data-i18n="h_report">Speech Timing Report</h2>
    <button class="btn" id="btnRefresh" onclick="loadData()" data-i18n="btn_refresh">↻ Refresh</button>
    <button class="btn" id="btnPrint"   onclick="window.print()" data-i18n="btn_print">Print</button>
  </div>

  <table>
    <thead>
      <tr>
        <th id="th_num">#</th>
        <th id="th_speaker">Speaker</th>
        <th id="th_green">Green</th>
        <th id="th_amber">Amber</th>
        <th id="th_red">Red</th>
        <th id="th_flash">Flash</th>
        <th id="th_actual">Actual</th>
        <th id="th_status">Status</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="8" style="color:#6b7280;text-align:center;padding:2rem" id="msgLoading">Loading…</td></tr>
    </tbody>
  </table>

  <div class="status" id="st"></div>
</div>

<script src="/translations.js"></script>
<script>
// ── i18n ─────────────────────────────────────────────────────────────────────
let currentLang = 'en';
function t(key){
  const tr=(window.TRANSLATIONS||{})[currentLang]||{};
  const en=(window.TRANSLATIONS||{}).en||{};
  return tr[key]!==undefined?tr[key]:(en[key]!==undefined?en[key]:key);
}
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.dataset.i18n); });
  document.getElementById('th_num').textContent     = t('col_num');
  document.getElementById('th_speaker').textContent = t('col_speaker');
  document.getElementById('th_green').textContent   = t('col_green');
  document.getElementById('th_amber').textContent   = t('col_amber');
  document.getElementById('th_red').textContent     = t('col_red');
  document.getElementById('th_flash').textContent   = t('col_flash');
  document.getElementById('th_actual').textContent  = t('col_actual');
  document.getElementById('th_status').textContent  = t('col_status');
}

function fmt(s){if(s==null||s===''||s===undefined)return'\u2014';s=Math.floor(+s);return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0');}

function badge(actual, thr){
  if(actual==null) return `<span class="badge b-none">${t('badge_not_timed')}</span>`;
  const s=+actual,g=thr[0],a=thr[1],r=thr[2],f=thr[3];
  if(f&&s>=f) return `<span class="badge b-over">${t('badge_over')}</span>`;
  if(r&&s>=r) return `<span class="badge b-red">${t('badge_red')}</span>`;
  if(a&&s>=a) return `<span class="badge b-amber">${t('badge_amber')}</span>`;
  if(g&&s>=g) return `<span class="badge b-green">${t('badge_green')}</span>`;
  return `<span class="badge b-under">${t('badge_under')}</span>`;
}

function render(speakers){
  const tb=document.getElementById('tbody');
  if(!speakers.length){
    tb.innerHTML=`<tr><td colspan="8" style="color:#6b7280;text-align:center;padding:2rem">${t('msg_no_speakers')}</td></tr>`;
    return;
  }
  tb.innerHTML=speakers.map((s,i)=>{
    const thr=s.preset||[0,0,0,0];
    return`<tr>
      <td>${i+1}</td>
      <td class="name">${escHtml(s.name||'')}</td>
      <td>${fmt(thr[0])}</td>
      <td>${fmt(thr[1])}</td>
      <td>${fmt(thr[2])}</td>
      <td>${fmt(thr[3])}</td>
      <td>${fmt(s.actual)}</td>
      <td>${badge(s.actual,thr)}</td>
    </tr>`;
  }).join('');
}

function loadData(){
  document.getElementById('st').textContent=t('msg_loading');
  fetch('/api/speakers')
    .then(r=>r.json())
    .then(data=>{render(data);document.getElementById('st').textContent='';})
    .catch(()=>{document.getElementById('st').textContent=t('msg_error');});
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Keep a WebSocket open so the server knows this page is active (prevents
// the LED idle/IP animation from triggering during page visits).
(function(){
  let ws, retryTimer;
  function connect(){
    ws=new WebSocket('ws://'+location.host+'/ws');
    ws.onmessage=function(e){
      try{
        const d=JSON.parse(e.data);
        if(d.type==='config'){
          const lang=(d.config||{}).language||'en';
          if(lang!==currentLang){currentLang=lang;applyI18n();}
        }
      }catch(ex){}
    };
    ws.onclose=function(){retryTimer=setTimeout(connect,2000);};
    ws.onerror=function(){ws.close();};
  }
  window.addEventListener('beforeunload',function(){clearTimeout(retryTimer);if(ws)ws.close();});
  connect();
})();

// Fetch config for language, then load data
fetch('/api/config')
  .then(r=>r.json())
  .then(cfg=>{
    const lang=cfg.language||'en';
    if(lang!==currentLang){currentLang=lang;applyI18n();}
    loadData();
  })
  .catch(()=>loadData());
</script>
</body>
</html>
